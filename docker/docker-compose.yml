services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nlp-dialogue-service-pr8
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nlp_dialogue_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
    ports:
      - "8080:8080"
    volumes:
      - nlp_dialogue_models:/app/data/models
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: nlp-dialogue-postgres-pr8
    environment:
      POSTGRES_DB: nlp_dialogue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nlp_dialogue_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nlp_dialogue_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nlp_dialogue_pgdata:
  nlp_dialogue_models:
