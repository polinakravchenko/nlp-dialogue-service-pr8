spring:
  application:
    name: nlp-dialogue-service-pr8

  datasource:
    url: jdbc:h2:mem:nlp_dialogue_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  opennlp:
    intent-model-path: data/models/intent-doccat.bin
    training-corpus-path: training/intents.train
    auto-train-on-startup: true
  llm:
    enabled: true
    provider: openai
    api-url: https://api.openai.com/v1/responses
    model: ${OPENAI_MODEL:gpt-5.4-mini}
    api-key: ${OPENAI_API_KEY:}
    connect-timeout-seconds: 10
    request-timeout-seconds: 60
    fallback-to-local-response: true
  performance:
    default-iterations: 50

logging:
  level:
    com.example.nlpdialogue: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
